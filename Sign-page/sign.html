<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="css/sign.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/normalize.css">
  <title>Sign</title>
  <link rel="icon" href="../Home-page/images/favicon.svg">
  
</head>
<body>
  
  <a href="../Home-page/Home.html">
    <i class="fa-solid fa-house"></i>
  </a>
  
  <div class="container" id="container">
    <div class="form-container sign-up-container">
      <form method="get" id="registerForm">
        <h2>Create Account</h2>
        <div class="social-icons">
            <a href="#" class="icon">
            <i class="fa-brands fa-google"></i>
            </a>
            <a href="#" class="icon">
               <i class="fa-brands fa-facebook"></i>
            </a>
            <a href="#" class="icon">
               <i class="fa-brands fa-github"></i>
            </a>
            <a href="#" class="icon">
             <i class="fa-brands fa-linkedin-in"></i>
            </a>
           </div>
              <span>or use your email for registeration</span>
              <input type="text" id="regName" name="name" placeholder="Name" required autofocus />
              <input type="email" id="regEmail" name="mail" placeholder="Email" required  />
              <input type="password" id="regPassword" name="password" placeholder="Password" required />
              <button>Sign Up</button>
      </form>
    </div>
    <div class="form-container sign-in-container" >
      <form method="get"id="loginForm">
        <h2>Sign In</h2>
        <div class="social-icons">
          <a href="#" class="icon">
           <i class="fa-brands fa-google"></i>
          </a>
           <a href="#" class="icon">
               <i class="fa-brands fa-facebook"></i>
           </a>
           <a href="#" class="icon">
               <i class="fa-brands fa-github"></i></i>
           </a>
           <a href="#" class="icon">
             <i class="fa-brands fa-linkedin-in"></i>
           </a>
         </div>
         <span>or use your email password</span>
        <input type="email" id="loginEmail" name="mail" placeholder="Email"required autofocus/>
        <input type="password" id="loginPassword" name="password" placeholder="Password" required />
        <a href="#">Forget Your Password?</a>
        <button>Sign In</button>
      </form>
    </div>
    <div class="overlay-container">
      <div class="overlay">
        <div class="overlay-panel overlay-left">
          <h1>Welcome Back!</h1>
            <p>Enter your personal details to use all of site features</p>
          <button class="hidden" id="login">Sign In</button>
        </div>
        <div class="overlay-panel overlay-right">
          <h1>Hello,Friend!</h1>
            <p>Register with your personal details to use all of site features</p>
          <button class="hidden" id="register">Sign Up</button>
        </div>
      </div>
    </div>
  </div>
   <script src="sign.js"></script>
</body>
</html>
