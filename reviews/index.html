<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <title>Reviews</title>
  <link rel="icon" href="../Home-page/images/favicon.svg">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: Arial, sans-serif; background: #fafafa; margin: 20px; }
    .search-container { max-width: 400px; margin: auto 0 20px; }
    input[type="search"] {
      width: 100%; padding: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc;
    }
    .courses { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .course-card {
      background: white; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px; padding: 15px; display: flex; flex-direction: column; align-items: center;
      text-align: center;
    }
    .course-card img {
      width: 100%; height: 160px; object-fit: cover; border-radius: 10px;
    }
    .course-title { font-size: 1.3em; margin: 10px 0 5px; }
    .course-desc { font-size: 0.9em; color: #555; min-height: 60px; }
    .rating {
      margin: 10px 0; font-size: 1.2em; color: gold;
    }
    .reviews {
      text-align: right; font-size: 0.9em; margin-top: 10px;
      border-top: 1px solid #eee; padding-top: 8px; width: 100%;
    }
    .review {
      background: #f0f0f0; border-radius: 5px; margin-bottom: 6px; padding: 5px 8px;
    }
    .review strong { display: block; margin-bottom: 3px; }
  </style>
</head>
<body>

  <div class="search-container">
    <input type="search" id="searchInput" placeholder="Search..." />
  </div>

  <div class="courses" id="coursesContainer"></div>

  <script src="review.js" > </script>
</body>
</html>
